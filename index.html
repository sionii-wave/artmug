<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쇼니 커미션</title>
    <style>
        /* 1. 기본 레이아웃 */
        body { background-color: #fffdfb; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; font-family: 'Pretendard', sans-serif; color: #334155; }
        img { max-width: 100%; height: auto; display: block; border-radius: 20px; }

        /* 2. 상단 섹션 */
        .main-logo { width: 100%; border-radius: 30px; margin-bottom: 25px; }
        .intro-box { background: #fff; border: 1px solid #ffebdb; border-radius: 30px; padding: 40px 20px; text-align: center; margin-bottom: 20px; }
        .intro-text { font-size: 16px; color: #645143; line-height: 1.8; }

        .event-box { background: #fffaf5; border: 2px solid #ff7f50; border-radius: 25px; padding: 30px 20px; text-align: center; margin-bottom: 40px; position: relative; }
        .event-badge { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: #ff7f50; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .event-price { font-size: 20px; font-weight: 800; color: #ff7f50; margin-top: 10px; }
        .price-old { text-decoration: line-through; color: #d0b8a8; margin-right: 8px; }

        /* 3. 필독사항 (아코디언) */
        .section-header { font-size: 22px; font-weight: 900; color: #4a3b31; margin: 30px 0 20px; display: flex; align-items: center; gap: 10px; }
        .acc-item { background: #fff; border: 1px solid #ffebdb; border-radius: 15px; margin-bottom: 12px; overflow: hidden; }
        .acc-input { display: none; }
        .acc-header { display: flex; align-items: center; padding: 18px 25px; cursor: pointer; font-weight: 700; color: #4a3b31; }
        .acc-icon { margin-right: 15px; }
        .acc-content { max-height: 0; overflow: hidden; transition: 0.3s; background: #fffdfb; }
        .acc-body { padding: 20px 25px 30px 55px; font-size: 14px; line-height: 1.8; border-top: 1px solid #fff5eb; }
        .acc-input:checked ~ .acc-content { max-height: 1000px; }

        /* 4. 개인작 슬라이더 (버튼 색상 수정됨) */
        .tab-menu { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 18px; border: 1px solid #ffebdb; background: #fff; border-radius: 20px; font-size: 13px; font-weight: 700; color: #7f6a5b; cursor: pointer; transition: 0.3s; }
        
        /* [중요] 눌렀을 때 보라색으로 변하는 스타일 */
        .tab-btn.active { background: #8b5cf6 !important; color: #fff !important; border-color: #8b5cf6 !important; }

        .slider-wrap { position: relative; width: 100%; background: #fff; border: 1px solid #ffebdb; border-radius: 25px; overflow: hidden; min-height: 300px; }
        .slider-track { display: flex; transition: transform 0.4s; align-items: center; }
        .slide-img { min-width: 100%; padding: 10px; box-sizing: border-box; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: #ff7f50; font-weight: bold; z-index: 5; }
        .prev { left: 10px; } .next { right: 10px; }

        .ready-box { width: 100%; padding: 100px 0; text-align: center; color: #8b5cf6; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://github.com/sionii-wave/artmug/blob/main/KakaoTalk_20260404_030131353.png?raw=true" class="main-logo">
    
    <div class="intro-box">
        <div class="intro-text">안녕하세요 작가 쇼니입니다. 최선을 다하겠습니다. ♡</div>
    </div>

    <div class="event-box">
        <div class="event-badge">EVENT</div>
        <div>데뷔 패키지 할인 이벤트 중!</div>
        <div class="event-price"><span class="price-old">300,000원</span> 180,000원</div>
    </div>

    <div class="section-header">💜 필독사항</div>
    
    <div class="acc-item">
        <input type="checkbox" id="n1" class="acc-input">
        <label for="n1" class="acc-header"><span class="acc-icon">💜</span> 작업 관련 안내</label>
        <div class="acc-content"><div class="acc-body">문의 먼저 부탁드립니다. 작업 기간은 7~14일 소요됩니다.</div></div>
    </div>
    
    <div class="acc-item">
        <input type="checkbox" id="n2" class="acc-input">
        <label for="n2" class="acc-header"><span class="acc-icon">💜</span> BOOTH 관련 안내</label>
        <div class="acc-content"><div class="acc-body">저작권 확인 필수! 기프트 기능을 이용해 파츠를 전달해주세요.</div></div>
    </div>

    <div class="section-header">💜 개인작</div>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="changeTab('all', this)">전체</button>
        <button class="tab-btn" onclick="changeTab('shinano', this)">시나노개인작</button>
        <button class="tab-btn" onclick="changeTab('airi', this)">아이리개인작</button>
        <button class="tab-btn" onclick="changeTab('miltina', this)">밀티나개인작</button>
        <button class="tab-btn" onclick="changeTab('ready', this)">준비중</button>
    </div>

    <div class="slider-wrap">
        <button class="nav-btn prev" onclick="move(-1)">❮</button>
        <div class="slider-track" id="track"></div>
        <button class="nav-btn next" onclick="move(1)">❯</button>
    </div>
</div>

<script>
    const data = {
        shinano: ["https://github.com/sionii-wave/artmug/blob/main/%EC%8B%9C%EB%82%98%EB%85%B8%EA%B0%9C%EC%9D%B8%EC%9E%917.jpg?raw=true"],
        airi: ["https://github.com/sionii-wave/artmug/blob/main/%EC%95%84%EC%9D%B4%EB%A6%AC%EA%B0%9C%EC%9D%B8%EC%9E%916.jpg?raw=true"],
        miltina: [],
        ready: []
    };

    let currentImgs = [];
    let idx = 0;

    function changeTab(type, btn) {
        // 모든 버튼 보라색 제거, 클릭한 버튼만 보라색 추가
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const track = document.getElementById('track');
        track.innerHTML = "";
        idx = 0;

        // 이미지 데이터 설정 (밀티나도 이미지가 없으면 준비중으로 뜸)
        if (type === 'all') {
            currentImgs = [...data.shinano, ...data.airi];
        } else {
            currentImgs = data[type];
        }

        if (currentImgs.length === 0) {
            track.innerHTML = `<div class="ready-box">준비중입니다... ᰔ</div>`;
            document.querySelectorAll('.nav-btn').forEach(n => n.style.display = 'none');
        } else {
            currentImgs.forEach(src => {
                const div = document.createElement('div');
                div.className = 'slide-img';
                div.innerHTML = `<img src="${src}">`;
                track.appendChild(div);
            });
            document.querySelectorAll('.nav-btn').forEach(n => n.style.display = currentImgs.length > 1 ? 'block' : 'none');
        }
        track.style.transform = `translateX(0)`;
    }

    function move(n) {
        if (currentImgs.length <= 1) return;
        idx = (idx + n + currentImgs.length) % currentImgs.length;
        document.getElementById('track').style.transform = `translateX(-${idx * 100}%)`;
    }

    // 초기 실행
    window.onload = () => document.querySelector('.tab-btn').click();
</script>

</body>
</html>
