<style>
    /* 기존 스타일 유지 및 신규 스타일 추가 */
    .artmug-full-container { max-width: 850px; margin: 0 auto; font-family: 'Pretendard', sans-serif; color: #334155; line-height: 1.6; background-color: #fffdfb; padding: 20px; }
    .profile-card { background: #fff; border: 1px solid #ffebdb; border-radius: 40px; padding: 40px 20px; text-align: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(255,165,0,0.03); }
    .profile-avatar { width: 100px; height: 100px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(255,127,80,0.1); }
    .profile-name { font-size: 28px; font-weight: 900; color: #ff7f50; margin: 0 0 10px 0; }
    .profile-desc { font-size: 14px; color: #7f6a5b; margin-bottom: 25px; }
    .tag-item { padding: 6px 18px; background: #fff; color: #ff9f43; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid #ffebdb; margin: 2px; display: inline-block; }

    .main-logo-img { width: 100%; border-radius: 30px; margin-bottom: 40px; }
    .section-box { background: #fff; border: 1px solid #ffebdb; border-radius: 30px; padding: 35px; margin-bottom: 40px; }
    .section-header { font-size: 20px; font-weight: 800; color: #4a3b31; margin-bottom: 25px; display: flex; align-items: center; }
    .section-header::before { content: ''; width: 4px; height: 20px; background: #ff9f43; margin-right: 12px; border-radius: 2px; }

    /* [신규] 개인작 안내 슬라이더 스타일 */
    .slider-container { position: relative; width: 100%; background: #f8f9fa; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; }
    .slides { display: flex; transition: transform 0.5s ease-in-out; }
    .slide-item { min-width: 100%; box-sizing: border-box; }
    .slide-item img { width: 100%; display: block; border-radius: 20px; }
    
    .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: #ff9f43; font-weight: bold; z-index: 10; transition: 0.3s; }
    .slider-btn:hover { background: #ff9f43; color: #fff; }
    .prev-btn { left: 15px; }
    .next-btn { right: 15px; }

    .slider-dots { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
    .dot { width: 8px; height: 8px; background: #ddd; border-radius: 50%; cursor: pointer; }
    .dot.active { background: #ff9f43; width: 20px; border-radius: 4px; }

    /* [기존/수정] 계산기 및 공통 스타일 */
    .calc-box { background: #fff; border: 1px solid #ffebdb; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 40px rgba(255,165,0,0.02); }
    .calc-page { display: none; padding: 40px 60px; }
    .calc-page.active { display: block; }
    .art-input { width: 100%; padding: 14px 18px; border: 1px solid #ffebdb; border-radius: 15px; background: #fffdfb; font-size: 15px; box-sizing: border-box; }
    .opt-card { display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; border: 1px solid #ffebdb; border-radius: 20px; margin-bottom: 15px; cursor: pointer; background: #fff; }
    .btn-next { flex: 2; padding: 16px; background: #ff9f43; color: #fff; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
    .btn-prev { flex: 1; padding: 16px; background: #fff; color: #a18e80; border: 1px solid #ffebdb; border-radius: 15px; font-weight: bold; cursor: pointer; }
</style>

<div class="artmug-full-container">
    <div class="profile-card">
        <img src="아바타_원형_이미지_주소" class="profile-avatar">
        <div class="profile-name">쇼니</div>
        <div class="profile-desc">안녕하세요, 쇼니입니다!♡</div>
    </div>
    <img src="https://github.com/sionii-wave/artmug/blob/main/KakaoTalk_20260404_030131353.png?raw=true" class="main-logo-img">

    <div class="section-box">
        <div class="section-header">개인작 안내</div>
        
        <div class="slider-container">
            <button class="slider-btn prev-btn" onclick="moveSlide(-1)">❮</button>
            <div class="slides" id="mainSlides">
                <div class="slide-item"><img src="개인작_이미지1_주소"></div>
                <div class="slide-item"><img src="개인작_이미지2_주소"></div>
                <div class="slide-item"><img src="개인작_이미지3_주소"></div>
            </div>
            <button class="slider-btn next-btn" onclick="moveSlide(1)">❯</button>
        </div>
        <div class="slider-dots" id="slideDots">
            <div class="dot active" onclick="currentSlide(0)"></div>
            <div class="dot" onclick="currentSlide(1)"></div>
            <div class="dot" onclick="currentSlide(2)"></div>
        </div>

        <div class="acc-item" style="margin-top:25px;">
            <input type="checkbox" id="personal_notice" class="acc-input">
            <label for="personal_notice" class="acc-header">
                <div class="acc-icon">📋</div> 개인작 안내사항 (클릭해서 확인) <div class="acc-arrow">▼</div>
            </label>
            <div class="acc-content">
                <div class="acc-body">
                    · 모든 개인작은 <b>예약제</b>로 운영됩니다.<br>
                    · 작업 착수 후에는 환불이 불가능하니 신중하게 결정해 주세요.<br>
                    · 피드백은 총 2회 제공되며, 이후 추가 수정 시 비용이 발생합니다.
                </div>
            </div>
        </div>
    </div>

    <div class="section-header">신청양식 & 견적 계산기</div>
    <div class="calc-box">
        <div class="calc-page active" id="p1">
             <button class="btn-next" onclick="move(2)">다음 →</button>
        </div>
        </div>
</div>

<script>
    /* 슬라이더 스크립트 */
    let currentIdx = 0;
    const slides = document.getElementById('mainSlides');
    const dots = document.querySelectorAll('.dot');
    const totalSlides = document.querySelectorAll('.slide-item').length;

    function moveSlide(n) {
        currentIdx = (currentIdx + n + totalSlides) % totalSlides;
        updateSlider();
    }

    function currentSlide(n) {
        currentIdx = n;
        updateSlider();
    }

    function updateSlider() {
        slides.style.transform = `translateX(-${currentIdx * 100}%)`;
        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === currentIdx);
        });
    }

    /* 기존 계산기 함수 (move, render, copy 등 유지) */
    function move(n) {
        document.querySelectorAll('.calc-page').forEach(p => p.classList.remove('active'));
        document.getElementById('p'+n).classList.add('active');
    }
</script>
